name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/assets s3://bewire-ai-sdlc-2fbb95ea/assets \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
          aws s3 cp dist/index.html s3://bewire-ai-sdlc-2fbb95ea/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync dist s3://bewire-ai-sdlc-2fbb95ea \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=3600" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E25OWYMYYVXCRN \
            --paths "/*"
